name: Threads Notion Weekly Sync

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC — last 2 weeks only
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Fetch ALL posts (historical sync)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run sync
        env:
          THREADS_TOKEN:      ${{ secrets.THREADS_TOKEN }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:       ${{ secrets.NOTION_DB_ID }}
          GH_TOKEN:           ${{ secrets.GH_TOKEN }}
          GH_REPO:            ${{ secrets.GH_REPO }}
        run: |
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            node threads-sync.js --full-sync
          else
            node threads-sync.js --run-now
          fi

      - name: Upload sync log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-log-${{ github.run_number }}
          path: sync.log
          retention-days: 30
